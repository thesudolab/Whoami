<svg viewBox="150 170 550 330" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <style>
        .bg-fallback { fill: #0a0a0f; }
        .logo-text-style { font-family: 'Courier New', monospace; fill: #e2e8f0; font-weight: bold; }
    </style>
    <!-- Background card color to display the green glow perfectly -->
    <rect x="100" y="100" width="650" height="450" rx="8" class="bg-fallback" />

    <!-- The Threat Thread Path with Inline SMIL Animation Loop -->
    <path d="M 250,250 C 220,200 170,220 180,260 C 190,300 240,240 250,280 C 260,320 200,350 180,310 C 160,270 210,230 230,210 C 260,180 320,220 310,270 C 300,320 240,310 230,340 C 210,380 290,380 310,330 C 320,300 300,270 330,270 C 360,270 390,360 450,340 C 510,320 520,220 590,220 C 660,220 680,290 660,340 C 630,400 550,380 540,300 C 530,240 610,240 630,280 C 650,320 600,340 580,310 C 560,280 580,260 600,270 C 610,275 610,290 600,290"
          stroke="#00ff88" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none" 
          filter="drop-shadow(0 0 8px #00ff88)">
        <animate 
            attributeName="stroke-dasharray" 
            values="800; 800" 
            dur="6s" 
            repeatCount="indefinite" />
        <animate 
            attributeName="stroke-dashoffset" 
            values="800; 0; -800" 
            dur="6s" 
            repeatCount="indefinite" />
    </path>

    <!-- The Sudo Lab Bottom Typography -->
    <text class="logo-text-style" x="425" y="450" font-size="52" text-anchor="middle" filter="drop-shadow(0 0 5px rgba(0,255,136,0.5))">
        TheSudoLab
        <animate attributeName="opacity" values="0; 0; 1; 1" dur="4s" keyTimes="0; 0.2; 0.5; 1" repeatCount="1" fill="freeze" />
    </text>
</svg>
